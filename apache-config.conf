<VirtualHost *:80>
    # Change this to your desired domain or IP
    # For local testing, you might want to add '127.0.0.1 expenses.local' to /etc/hosts
    ServerName expenses.local
    ServerAlias localhost

    # Point this to where your files are
    DocumentRoot /home/aj/.gemini/antigravity/scratch

    WSGIDaemonProcess expenses user=aj group=aj threads=5
    WSGIScriptAlias / /home/aj/.gemini/antigravity/scratch/expenses.wsgi

    <Directory /home/aj/.gemini/antigravity/scratch>
        WSGIProcessGroup expenses
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/expenses-error.log
    CustomLog ${APACHE_LOG_DIR}/expenses-access.log combined
</VirtualHost>
