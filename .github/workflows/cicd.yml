name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Runs when you push to the 'main' branch
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Syntax Test (Verify python code compiles)
      run: |
        python -m py_compile app.py expenses.py

    # The CD Part: Pushing to Docker Hub
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        # These secrets must be added in GitHub Repository Settings -> Secrets and variables -> Actions
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # This matches what Watchtower looks for locally
        tags: meme06/expense-tracker:latest
